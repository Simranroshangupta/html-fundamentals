# check the number is Armstrong Number or not

num1 = 153
temp = num1
sum1 = 0
length = len(str(num1))

while temp > 0:
    rem = temp % 10
    sum1 += rem ** length
    temp = temp // 10

if sum1 == num1:
    print(f"The number {num1} is Armstrong")
else:
    print(f"The number {num1} is not Armstrong")
